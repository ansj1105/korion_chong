spring:
  application:
    name: korion-chong
  datasource:
    url: ${KORION_CHONG_DB_URL:jdbc:postgresql://localhost:5432/coin_system_cloud}
    username: ${KORION_CHONG_DB_USER:foxya}
    password: ${KORION_CHONG_DB_PASSWORD:}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

korion:
  chong:
    smtp:
      host: ${KORION_CHONG_SMTP_HOST:${SMTP_HOST:${MAIL_HOST:}}}
      port: ${KORION_CHONG_SMTP_PORT:${SMTP_PORT:${MAIL_PORT:587}}}
      username: ${KORION_CHONG_SMTP_USERNAME:${SMTP_USERNAME:${SMTP_USER:${MAIL_USERNAME:}}}}
      password: ${KORION_CHONG_SMTP_PASSWORD:${SMTP_PASSWORD:${SMTP_PASS:${MAIL_PASSWORD:}}}}
      from: ${KORION_CHONG_SMTP_FROM:${SMTP_FROM:${MAIL_FROM:${EMAIL_FROM:no-reply@korion.network}}}}
      start-tls: ${KORION_CHONG_SMTP_START_TLS:${SMTP_STARTTLS:${MAIL_STARTTLS:true}}}
