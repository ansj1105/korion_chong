spring:
  application:
    name: korion-chong
  datasource:
    url: ${KORION_CHONG_DB_URL:jdbc:postgresql://localhost:5432/coin_system_cloud}
    username: ${KORION_CHONG_DB_USER:foxya}
    password: ${KORION_CHONG_DB_PASSWORD:}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
