        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/settlements/detail:
    get:
      summary: Sales partner settlement detail page data
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
