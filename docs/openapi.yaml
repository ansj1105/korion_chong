openapi: 3.0.3
info:
  title: KORION Chong API
  version: 0.1.0
paths:
  /api/auth/login:
    post:
      summary: Authenticate an approved leader, partner, or merchant account
      description: Verifies users credentials and returns role-scoped routing metadata. It does not create authority from signup applications and does not issue a session token until session policy is finalized.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded for the selected approved role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/auth/availability:
    get:
      summary: Check signup field availability
      parameters:
        - name: field
          in: query
          required: true
          schema:
            type: string
            enum:
              - loginId
              - email
              - telegram
              - whatsapp
              - walletAddress
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result for frontend modal/toast handling.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
  /api/auth/referral-codes/{code}/validate:
    get:
      summary: Validate a leader or partner referral code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Referral code validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralCodeValidationResponse'
  /api/auth/email-verifications/send:
    post:
      summary: Send distributor signup email verification code
      description: Stores only a code hash in distributor_signup_email_verifications. The raw code must be delivered by the configured mail adapter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationSendRequest'
      responses:
        '200':
          description: Verification code was created for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationSendResponse'
  /api/auth/email-verifications/confirm:
    post:
      summary: Confirm distributor signup email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
  /api/auth/wallet-links/verify:
    post:
      summary: Verify KORION WALLET TRX address ownership for signup
      description: Stores only a signature hash and verification result in distributor_signup_wallet_verifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletLinkVerifyRequest'
      responses:
        '200':
          description: Wallet verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletLinkVerifyResponse'
  /api/auth/signup-applications:
    post:
      summary: Submit public partner or merchant signup application
      description: Creates a partner_applications row only. It does not create users, partners, merchants, or login authority.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupApplicationRequest'
      responses:
        '200':
          description: Signup application submitted for review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupApplicationResponse'
  /api/leader/dashboard:
    get:
      summary: Country leader dashboard summary
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - name: period
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: '2026-06'
        - name: countryScope
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: KR
      responses:
        '200':
          description: Dashboard summary scoped to the authenticated country leader.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderDashboardResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partners:
    get:
      summary: Approved sales partners under a country leader
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - name: countryScope
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: KR
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - SALES_PARTNER_APPROVED
        - name: region
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Approved sales partner page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderPartnerResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partner-applications:
    get:
      summary: Partner signup applications for leader request page
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partner-requests:
    get:
      summary: Alias for partner signup applications
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/merchant-applications:
    get:
      summary: Merchant signup applications for leader request page
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
