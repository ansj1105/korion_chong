  /api/leader/transactions:
    get:
      summary: Transaction log page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
        - name: variant
          in: query
          schema:
            type: string
            enum: [all, offline, failed]
            default: all
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlements/request-summary:
    get:
      summary: Settlement request summary page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
