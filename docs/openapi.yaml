components:
  parameters:
    LeaderIdHeader:
      name: X-Leader-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
      description: Temporary leader partner id until JWT auth is wired.
    PartnerIdHeader:
      name: X-Partner-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
      description: Temporary sales partner id until JWT auth is wired.
    CountryScopesHeader:
      name: X-Country-Scopes
      in: header
      required: true
      schema:
        type: string
      description: Temporary comma-separated country scopes until JWT auth is wired.
    CountryScopeQuery:
      name: countryScope
      in: query
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
      example: KR
    PeriodQuery:
      name: period
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
      example: '2026-06'
  responses:
    ForbiddenCountryScope:
      description: Requested countryScope is outside the authenticated role's server-side country scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    LeaderPageData:
      description: Page data shaped for the current KORION PAY leader admin frontend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LeaderPageDataResponse'
    PartnerPageData:
      description: Page data shaped for the current KORION PAY partner admin frontend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PartnerPageDataResponse'
  schemas:
    LeaderPageDataResponse:
      type: object
      additionalProperties: true
      description: >
        Transitional frontend page payload. Each leader page returns the same top-level
        keys used by its existing JSON fallback, such as stats, metrics, rows, t1Rows,
        t2Rows, all/offline/failed rows, banner, summary, statusItems, and field groups.
    PartnerPageDataResponse:
      type: object
      additionalProperties: true
      description: >
        Transitional frontend page payload. Each partner page returns the same top-level
        keys used by its existing JSON fallback, scoped by X-Partner-Id and countryScope.
    LoginRequest:
      type: object
      required:
        - loginId
        - password
        - role
      properties:
        loginId:
          type: string
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          writeOnly: true
        role:
          type: string
          enum:
            - LEADER
            - PARTNER
            - MERCHANT
        requestId:
          type: string
          maxLength: 128
    LoginResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        userId:
          type: integer
          format: int64
        role:
          type: string
          enum:
            - LEADER
            - PARTNER
            - MERCHANT
        partnerId:
          type: integer
          format: int64
          nullable: true
        merchantId:
          type: integer
          format: int64
          nullable: true
        countryScopes:
          type: array
          items:
            type: string
        redirectPath:
          type: string
          enum:
            - /leader/dashboard
            - /partner/dashboard
            - /merchant/dashboard
        requiresTwoFactor:
          type: boolean
          description: false until the 2FA method and challenge contract are finalized.
        sessionExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: null until session issuance policy is finalized.
        resultCode:
          type: string
          enum:
            - LOGIN_SUCCESS
        messageKey:
          type: string
    AvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
        field:
          type: string
        resultCode:
          type: string
          enum:
            - AVAILABLE
            - DUPLICATE
        messageKey:
          type: string
    ReferralCodeValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        code:
          type: string
        codeType:
          type: string
        ownerPartnerId:
          type: integer
          format: int64
        country:
          type: string
        city:
          type: string
        resultCode:
          type: string
        messageKey:
          type: string
    SignupApplicationRequest:
      type: object
      required:
        - applicantType
        - loginId
        - password
        - email
        - companyName
        - contactName
      properties:
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        loginId:
          type: string
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          writeOnly: true
          description: Raw password is accepted only for signup submission and stored as password_hash on the inactive application record.
        email:
          type: string
          format: email
          maxLength: 255
          description: Must have a VERIFIED row in distributor_signup_email_verifications before submission.
        companyName:
          type: string
          maxLength: 160
        contactName:
          type: string
          maxLength: 120
        phone:
          type: string
          maxLength: 80
        telegram:
          type: string
          maxLength: 120
        whatsapp:
          type: string
          maxLength: 80
        referralCode:
          type: string
          maxLength: 64
        country:
          type: string
          pattern: '^[A-Z]{2}$'
        region:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        address:
          type: string
          maxLength: 1000
        businessType:
          type: string
          maxLength: 80
        walletAddress:
          type: string
          description: TRON address. Stored only in partner_applications until approval.
        integrationPlan:
          type: string
          maxLength: 4000
        evidenceNote:
          type: string
          maxLength: 4000
        requestId:
          type: string
          maxLength: 128
    SignupApplicationResponse:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - REQUESTED
        resultCode:
          type: string
          enum:
            - SIGNUP_APPLICATION_SUBMITTED
        messageKey:
          type: string
        walletStored:
          type: boolean
          description: true only when the application table stores the submitted wallet address; no authority is granted.
    EmailVerificationSendRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        requestId:
          type: string
          maxLength: 128
    EmailVerificationSendResponse:
      type: object
      properties:
        resultCode:
          type: string
          enum:
            - EMAIL_VERIFICATION_SENT
        messageKey:
          type: string
        expiresAt:
          type: string
          format: date-time
    EmailVerificationConfirmRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        code:
          type: string
          pattern: '^\d{6}$'
        requestId:
          type: string
          maxLength: 128
    EmailVerificationConfirmResponse:
      type: object
      properties:
        verified:
          type: boolean
        resultCode:
          type: string
          enum:
            - EMAIL_VERIFIED
        messageKey:
          type: string
    WalletLinkVerifyRequest:
      type: object
      required:
        - applicantType
        - walletAddress
        - nonce
        - signature
      properties:
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        email:
          type: string
          format: email
          maxLength: 255
        walletAddress:
          type: string
          description: KORION WALLET TRX address.
        nonce:
          type: string
          maxLength: 128
        signature:
          type: string
          maxLength: 4096
          description: Raw signature is verified but never stored; only SHA-256 hash is persisted.
        requestId:
          type: string
          maxLength: 128
    WalletLinkVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        authStatus:
          type: string
          enum:
            - VERIFIED
        resultCode:
          type: string
          enum:
            - WALLET_VERIFIED
        messageKey:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - code
        - message
      properties:
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        message:
          type: string
    LeaderDashboardResponse:
      type: object
      required:
        - leaderProfile
        - kpis
        - organizationSummary
        - monthlyVolume
        - feeSummary
        - riskAlerts
      properties:
        leaderProfile:
          $ref: '#/components/schemas/LeaderProfile'
        kpis:
          $ref: '#/components/schemas/LeaderKpis'
        organizationSummary:
          $ref: '#/components/schemas/OrganizationSummary'
        monthlyVolume:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyVolume'
        feeSummary:
          $ref: '#/components/schemas/FeeSummary'
        riskAlerts:
          type: array
          items:
            $ref: '#/components/schemas/RiskAlert'
    LeaderProfile:
      type: object
      properties:
        leaderId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        loginId:
          type: string
        status:
          type: string
          enum:
            - COUNTRY_LEADER_APPROVED
        countryScopes:
          type: array
          items:
            type: string
    LeaderKpis:
      type: object
      properties:
        approvedPartnerCount:
          type: integer
          format: int64
        approvedMerchantCount:
          type: integer
          format: int64
        completedTransactionAmount:
          type: string
          format: decimal
        confirmedCommissionAmount:
          type: string
          format: decimal
    OrganizationSummary:
      type: object
      properties:
        partnerCount:
          type: integer
          format: int64
        merchantCount:
          type: integer
          format: int64
    MonthlyVolume:
      type: object
      properties:
        month:
          type: string
          example: '2026-06'
        amount:
          type: string
          format: decimal
        transactionCount:
          type: integer
          format: int64
    FeeSummary:
      type: object
      properties:
        countryLeaderFee:
          type: string
          format: decimal
        salesPartnerFee:
          type: string
          format: decimal
        korionFee:
          type: string
          format: decimal
    RiskAlert:
      type: object
      properties:
        type:
          type: string
        severity:
          type: string
        message:
          type: string
    LeaderPartnerResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PartnerSummary'
        page:
          $ref: '#/components/schemas/PageMeta'
    PartnerSummary:
      type: object
      properties:
        partnerId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        loginId:
          type: string
        country:
          type: string
        region:
          type: string
        city:
          type: string
        status:
          type: string
          enum:
            - SALES_PARTNER_APPROVED
        merchantCount:
          type: integer
          format: int64
        completedTransactionAmount:
          type: string
          format: decimal
        lastActivityAt:
          type: string
          format: date-time
    PageMeta:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
          format: int64
