openapi: 3.0.3
info:
  title: KORION Chong API
  version: 0.1.0
paths:
  /api/auth/login:
    post:
      summary: Authenticate an approved leader, partner, or merchant account
      description: Verifies users credentials and returns role-scoped routing metadata. It does not create authority from signup applications and does not issue a session token until session policy is finalized.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded for the selected approved role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/auth/availability:
    get:
      summary: Check signup field availability
      parameters:
        - name: field
          in: query
          required: true
          schema:
            type: string
            enum:
              - loginId
              - email
              - telegram
              - phone
              - whatsapp
              - walletAddress
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result for frontend modal/toast handling.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
  /api/auth/referral-codes/{code}/validate:
    get:
      summary: Validate a leader or partner referral code
      description: Validates canonical referral codes stored in referral_codes. Codes must follow `<countryCode>-LEAD-<number>` or `<countryCode>-SP-<number>`, for example `NG-LEAD-001`.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{2}-(LEAD|SP)-[0-9]{3}$'
            example: NG-LEAD-001
          examples:
            leader:
              summary: Leader referral code
              value: NG-LEAD-001
            partner:
              summary: Partner referral code
              value: NG-SP-004
      responses:
        '200':
          description: Referral code validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralCodeValidationResponse'
  /api/auth/signup-options:
    get:
      summary: Signup dropdown options
      description: Returns active dropdown options used by the partner and merchant signup form. Country options are sourced from country_codes.
      responses:
        '200':
          description: Signup dropdown options.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupOptionsResponse'
  /api/auth/email-verifications/send:
    post:
      summary: Send distributor signup email verification code
      description: Stores only a code hash in distributor_signup_email_verifications and delivers the raw code through the configured SMTP adapter. The code expires 300 seconds after issuance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationSendRequest'
      responses:
        '200':
          description: Verification code was created for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationSendResponse'
  /api/auth/email-verifications/confirm:
    post:
      summary: Confirm distributor signup email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmResponse'
  /api/auth/wallet-links/verify:
    post:
      summary: Verify KORION WALLET TRX address ownership for signup
      description: Stores only a signature hash and verification result in distributor_signup_wallet_verifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletLinkVerifyRequest'
      responses:
        '200':
          description: Wallet verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletLinkVerifyResponse'
  /api/auth/wallet-addresses/validate:
    post:
      summary: Validate supported KORION WALLET address for signup
      description: Validates address format and duplicate usage for TRX/TRON, BTC, and ERC/EVM compatible addresses without requiring a wallet signature.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletAddressValidateRequest'
      responses:
        '200':
          description: Wallet address validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletAddressValidateResponse'
  /api/auth/signup-applications:
    post:
      summary: Submit public partner or merchant signup application
      description: Creates a partner_applications row only. It does not create users, partners, merchants, or login authority.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupApplicationRequest'
      responses:
        '200':
          description: Signup application submitted for review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupApplicationResponse'
  /api/leader/dashboard:
    get:
      summary: Country leader dashboard summary
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - name: period
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: '2026-06'
        - name: countryScope
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: KR
      responses:
        '200':
          description: Dashboard summary scoped to the authenticated country leader.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderDashboardResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partners:
    get:
      summary: Approved sales partners under a country leader
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - name: countryScope
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: KR
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - SALES_PARTNER_APPROVED
        - name: region
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Approved sales partner page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderPartnerResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partner-applications:
    get:
      summary: Partner signup applications for leader request page
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partner-requests:
    get:
      summary: Alias for partner signup applications
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/merchant-applications:
    get:
      summary: Merchant signup applications for leader request page
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/merchant-requests:
    get:
      summary: Alias for merchant signup applications
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/partner-sales:
    get:
      summary: Partner sales summary page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/merchants:
    get:
      summary: Merchants under a country leader
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/merchant-sales:
    get:
      summary: Merchant sales summary page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/transactions:
    get:
      summary: Transaction log page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
        - name: variant
          in: query
          schema:
            type: string
            enum: [all, offline, failed]
            default: all
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlements/request-summary:
    get:
      summary: Settlement request summary page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlements:
    get:
      summary: Settlement history page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlements/detail:
    get:
      summary: Settlement detail page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlement-requests:
    post:
      summary: Create a country leader settlement request
      description: Recalculates available commission entries server-side and creates a REQUESTED distributor_settlement_requests row for the authenticated leader.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementCreateRequest'
      responses:
        '200':
          description: Settlement request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementActionResponse'
  /api/leader/settlement-requests/{settlementRequestId}/approve:
    post:
      summary: Approve a subordinate settlement request
      description: Moves a manageable REQUESTED settlement request to APPROVED and marks linked commission entries APPROVED or HELD.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/SettlementRequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementActionRequest'
      responses:
        '200':
          description: Settlement request approved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementActionResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlement-requests/{settlementRequestId}/reject:
    post:
      summary: Reject a subordinate settlement request
      description: Moves a manageable REQUESTED settlement request to REJECTED and marks linked commission entries REJECTED.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/SettlementRequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementActionRequest'
      responses:
        '200':
          description: Settlement request rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementActionResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/settlement-requests/{settlementRequestId}/mark-paid:
    post:
      summary: Mark an approved subordinate settlement request as paid
      description: Moves a manageable APPROVED settlement request to PAID and marks linked commission entries PAID.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/SettlementRequestIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementActionRequest'
      responses:
        '200':
          description: Settlement request marked paid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementActionResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/hq-notices:
    get:
      summary: HQ notices visible to the leader
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/notices/send-summary:
    get:
      summary: Notice send page recipient summary
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/notices:
    get:
      summary: Notice send history page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/notices/history:
    get:
      summary: Alias for notice send history page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/notices/send:
    post:
      summary: Send or schedule a leader notice to subordinate partners and merchants
      description: Stores the notice body, recipient delivery rows, and activity log in one transaction. scheduledAt creates SCHEDULED/PENDING history; otherwise the notice is stored as SENT/SENT.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoticeSendRequest'
      responses:
        '200':
          description: Notice send request was stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeSendResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/profile:
    get:
      summary: Leader profile page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/activity-logs:
    get:
      summary: Leader activity log page data
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/LeaderPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/signup-applications/{applicationId}/approve:
    post:
      summary: Approve a partner or merchant signup application
      description: Creates or connects runtime users plus the approved partners/merchants, distributor_contracts, and distributor_wallet_addresses records for a decisionable signup application.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/ApplicationIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupApprovalDecisionRequest'
      responses:
        '200':
          description: Signup application approved and runtime authority activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupApprovalResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/leader/signup-applications/{applicationId}/reject:
    post:
      summary: Reject a partner or merchant signup application
      description: Moves a decisionable signup application to REJECTED and records the decision activity.
      parameters:
        - $ref: '#/components/parameters/LeaderIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/ApplicationIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupApprovalDecisionRequest'
      responses:
        '200':
          description: Signup application rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupRejectionResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/dashboard:
    get:
      summary: Sales partner dashboard summary page data
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/merchant-applications:
    get:
      summary: Merchant application summary for a sales partner
      description: Returns only partner-owned merchant signup application rows using distributor_signup_applications.owner_partner_id as the server-side scope boundary.
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/merchant-applications/detail:
    get:
      summary: Merchant application detail page shell for a sales partner
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/merchants:
    get:
      summary: Merchants directly owned by a sales partner
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/merchant-sales:
    get:
      summary: Sales summary for merchants directly owned by a sales partner
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/settlements/request-summary:
    get:
      summary: Sales partner settlement request summary page data
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
        - $ref: '#/components/parameters/PeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/settlements:
    get:
      summary: Sales partner settlement history page data
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/settlements/detail:
    get:
      summary: Sales partner settlement detail page data
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/settlements/requests:
    post:
      summary: Create a sales partner settlement request
      description: Recalculates available commission entries server-side and creates a REQUESTED distributor_settlement_requests row for the authenticated sales partner.
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementCreateRequest'
      responses:
        '200':
          description: Settlement request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementActionResponse'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/hq-notices:
    get:
      summary: HQ notices visible to the sales partner
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/notices/send-summary:
    get:
      summary: Sales partner notice send recipient summary
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
