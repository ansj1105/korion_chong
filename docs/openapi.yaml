components:
  parameters:
    LeaderIdHeader:
      name: X-Leader-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
      description: Temporary leader partner id until JWT auth is wired.
    PartnerIdHeader:
      name: X-Partner-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
      description: Temporary sales partner id until JWT auth is wired.
    MerchantIdHeader:
      name: X-Merchant-Id
      in: header
      required: true
      schema:
        type: integer
        format: int64
      description: Temporary merchant id until JWT auth is wired.
    CountryScopesHeader:
      name: X-Country-Scopes
      in: header
      required: true
      schema:
        type: string
      description: Temporary comma-separated country scopes until JWT auth is wired.
    CountryScopeQuery:
      name: countryScope
      in: query
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
      example: KR
    PeriodQuery:
      name: period
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
      example: '2026-06'
    ApplicationIdPath:
      name: applicationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    SettlementRequestIdPath:
      name: settlementRequestId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  responses:
    ForbiddenCountryScope:
      description: Requested countryScope is outside the authenticated role's server-side country scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    LeaderPageData:
      description: Page data shaped for the current KORION PAY leader admin frontend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LeaderPageDataResponse'
    PartnerPageData:
      description: Page data shaped for the current KORION PAY partner admin frontend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PartnerPageDataResponse'
    MerchantPageData:
      description: Page data shaped for the current KORION PAY merchant admin frontend.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantPageDataResponse'
  schemas:
    LeaderPageDataResponse:
      type: object
      additionalProperties: true
      description: >
        Transitional frontend page payload. Each leader page returns the same top-level
        keys used by its existing JSON fallback, such as stats, metrics, rows, t1Rows,
        t2Rows, all/offline/failed rows, banner, summary, statusItems, and field groups.
    PartnerPageDataResponse:
      type: object
      additionalProperties: true
      description: >
        Transitional frontend page payload. Each partner page returns the same top-level
        keys used by its existing JSON fallback, scoped by X-Partner-Id and countryScope.
    MerchantPageDataResponse:
      type: object
      additionalProperties: true
      description: >
        Transitional frontend page payload. Each merchant page returns the same top-level
        keys used by its existing JSON fallback, scoped by X-Merchant-Id and countryScope.
    SignupApprovalDecisionRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 2000
        requestId:
          type: string
          maxLength: 128
    SignupApprovalResponse:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        status:
          type: string
          enum:
            - APPROVED
        userId:
          type: integer
          format: int64
        partnerId:
          type: integer
          format: int64
          nullable: true
        merchantId:
          type: integer
          format: int64
          nullable: true
        contractId:
          type: integer
          format: int64
          nullable: true
        walletAddressId:
          type: integer
          format: int64
          nullable: true
        resultCode:
          type: string
          enum:
            - SIGNUP_APPLICATION_APPROVED
        messageKey:
          type: string
    SignupRejectionResponse:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        status:
          type: string
          enum:
            - REJECTED
        resultCode:
          type: string
          enum:
            - SIGNUP_APPLICATION_REJECTED
        messageKey:
          type: string
    SettlementCreateRequest:
      type: object
      required:
        - periodStart
        - periodEnd
        - requestedAmount
      properties:
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        requestedAmount:
          type: number
          minimum: 0.000000000000000001
        walletAddressId:
          type: integer
          format: int64
          nullable: true
        memo:
          type: string
          maxLength: 2000
        requestId:
          type: string
          maxLength: 128
    SettlementActionRequest:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.000000000000000001
          nullable: true
        reason:
          type: string
          maxLength: 2000
        requestId:
          type: string
          maxLength: 128
    SettlementActionResponse:
      type: object
      properties:
        settlementRequestId:
          type: integer
          format: int64
        requestNo:
          type: string
        recipientType:
          type: string
          enum:
            - LEADER
            - PARTNER
            - MERCHANT
        recipientPartnerId:
          type: integer
          format: int64
          nullable: true
        recipientMerchantId:
          type: integer
          format: int64
          nullable: true
        requestedAmount:
          type: number
        approvedAmount:
          type: number
        heldAmount:
          type: number
        status:
          type: string
          enum:
            - REQUESTED
            - APPROVED
            - REJECTED
            - PAID
        resultCode:
          type: string
          enum:
            - SETTLEMENT_REQUEST_CREATED
            - SETTLEMENT_REQUEST_APPROVED
            - SETTLEMENT_REQUEST_REJECTED
            - SETTLEMENT_REQUEST_PAID
        messageKey:
          type: string
    NoticeRecipientRequest:
      type: object
      required:
        - recipientType
      properties:
        recipientType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        recipientPartnerId:
          type: integer
          format: int64
          nullable: true
        recipientMerchantId:
          type: integer
          format: int64
          nullable: true
    NoticeSendRequest:
      type: object
      required:
        - title
        - noticeType
        - body
        - channel
        - recipients
      properties:
        title:
          type: string
          maxLength: 255
        noticeType:
          type: string
          maxLength: 64
        body:
          type: string
        channel:
          type: string
          enum:
            - IN_APP
            - EMAIL
            - SMS
            - PUSH
        scheduledAt:
          type: string
          format: date-time
          nullable: true
          description: Must be later than the server clock when provided.
        recipients:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/NoticeRecipientRequest'
        requestId:
          type: string
          maxLength: 128
    NoticeSendResponse:
      type: object
      properties:
        noticeId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - SENT
            - SCHEDULED
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        recipientCount:
          type: integer
        resultCode:
          type: string
          enum:
            - NOTICE_SENT
            - NOTICE_SEND_SCHEDULED
        messageKey:
          type: string
    LoginRequest:
      type: object
      required:
        - loginId
        - password
        - role
      properties:
        loginId:
          type: string
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          writeOnly: true
        role:
          type: string
          enum:
            - LEADER
            - PARTNER
            - MERCHANT
        twoFactorCode:
          type: string
          maxLength: 16
          nullable: true
          description: Optional placeholder for future 2FA. Current login policy ignores this field and always returns requiresTwoFactor=false.
        requestId:
          type: string
          maxLength: 128
    LoginResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        userId:
          type: integer
          format: int64
        role:
          type: string
          enum:
            - LEADER
            - PARTNER
            - MERCHANT
        partnerId:
          type: integer
          format: int64
          nullable: true
        merchantId:
          type: integer
          format: int64
          nullable: true
        countryScopes:
          type: array
          items:
            type: string
        redirectPath:
          type: string
          enum:
            - /leader/dashboard
            - /partner/dashboard
            - /merchant/dashboard
        requiresTwoFactor:
          type: boolean
          description: false until the 2FA method and challenge contract are finalized.
        sessionExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: null until session issuance policy is finalized.
        resultCode:
          type: string
          enum:
            - LOGIN_SUCCESS
        messageKey:
          type: string
    AvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
        field:
          type: string
        resultCode:
          type: string
          enum:
            - AVAILABLE
            - DUPLICATE
        messageKey:
          type: string
    ReferralCodeValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        code:
          type: string
          example: NG-LEAD-001
        codeType:
          type: string
          enum:
            - COUNTRY_LEADER
            - SALES_PARTNER
        ownerPartnerId:
          type: integer
          format: int64
        country:
          type: string
        city:
          type: string
        resultCode:
          type: string
          enum:
            - VALID_CODE
            - INVALID_CODE
            - INVALID_CODE_FORMAT
        messageKey:
          type: string
    SignupOptionsResponse:
      type: object
      required:
        - countries
      properties:
        countries:
          type: array
          items:
            $ref: '#/components/schemas/SignupCountryOption'
    SignupCountryOption:
      type: object
      required:
        - code
        - nameEn
      properties:
        code:
          type: string
          example: NG
        nameEn:
          type: string
          example: Nigeria
        nameKo:
          type: string
          nullable: true
          example: 나이지리아
        flag:
          type: string
          nullable: true
          example: 🇳🇬
    SignupApplicationRequest:
      type: object
      required:
        - applicantType
        - loginId
        - password
        - email
        - companyName
        - contactName
        - telegram
        - whatsapp
        - country
        - region
        - walletAddress
      properties:
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        loginId:
          type: string
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          writeOnly: true
          description: Raw password is accepted only for signup submission and stored as password_hash on the inactive application record.
        email:
          type: string
          format: email
          maxLength: 255
          description: Must have a VERIFIED row in distributor_signup_email_verifications before submission.
        companyName:
          type: string
          maxLength: 160
        contactName:
          type: string
          maxLength: 120
        phone:
          type: string
          maxLength: 80
          description: Can be checked through /api/auth/availability with field=phone before submission.
        telegram:
          type: string
          maxLength: 120
          description: Can be checked through /api/auth/availability with field=telegram before submission.
        whatsapp:
          type: string
          maxLength: 80
          description: Can be checked through /api/auth/availability with field=phone or field=whatsapp before submission.
        referralCode:
          type: string
          maxLength: 64
        country:
          type: string
          pattern: '^[A-Z]{2}$'
        region:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        address:
          type: string
          maxLength: 1000
        businessType:
          type: string
          maxLength: 80
        walletAddress:
          type: string
          description: Supported KORION WALLET address (TRX/TRON, BTC, or ERC/EVM). Stored only in partner_applications until approval.
        integrationPlan:
          type: string
          maxLength: 4000
          nullable: true
          description: Nullable for referral-code signup paths. Required by the frontend when the applicant selects the HQ direct contract path.
        evidenceNote:
          type: string
          maxLength: 4000
          description: Required for MERCHANT applications as the verification document link or note.
        requestId:
          type: string
          maxLength: 128
    SignupApplicationResponse:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - REQUESTED
        resultCode:
          type: string
          enum:
            - SIGNUP_APPLICATION_SUBMITTED
        messageKey:
          type: string
        walletStored:
          type: boolean
          description: true only when the application table stores the submitted wallet address; no authority is granted.
    EmailVerificationSendRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        requestId:
          type: string
          maxLength: 128
    EmailVerificationSendResponse:
      type: object
      properties:
        resultCode:
          type: string
          enum:
            - EMAIL_VERIFICATION_SENT
        messageKey:
          type: string
        expiresAt:
          type: string
          format: date-time
          description: Verification code expiry time. The current TTL is 300 seconds.
    EmailVerificationConfirmRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        code:
          type: string
          pattern: '^\d{6}$'
        requestId:
          type: string
          maxLength: 128
    EmailVerificationConfirmResponse:
      type: object
      properties:
        verified:
          type: boolean
        resultCode:
          type: string
          enum:
            - EMAIL_VERIFIED
        messageKey:
          type: string
    WalletLinkVerifyRequest:
      type: object
      required:
        - applicantType
        - walletAddress
        - nonce
        - signature
      properties:
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        email:
          type: string
          format: email
          maxLength: 255
        walletAddress:
          type: string
          description: KORION WALLET TRX address.
        nonce:
          type: string
          maxLength: 128
        signature:
          type: string
          maxLength: 4096
          description: Raw signature is verified but never stored; only SHA-256 hash is persisted.
        requestId:
          type: string
          maxLength: 128
    WalletLinkVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        authStatus:
          type: string
          enum:
            - VERIFIED
        resultCode:
          type: string
          enum:
            - WALLET_VERIFIED
        messageKey:
          type: string
    WalletAddressValidateRequest:
      type: object
      required:
        - applicantType
        - walletAddress
      properties:
        applicantType:
          type: string
          enum:
            - PARTNER
            - MERCHANT
        email:
          type: string
          format: email
          maxLength: 255
        walletAddress:
          type: string
          maxLength: 255
          description: Supported KORION WALLET network address (TRX/TRON, BTC, or ERC/EVM).
        requestId:
          type: string
          maxLength: 128
    WalletAddressValidateResponse:
      type: object
      properties:
        verified:
          type: boolean
        walletNetwork:
          type: string
          enum:
            - TRON
            - BTC
            - EVM
        authStatus:
          type: string
          enum:
            - VERIFIED
        resultCode:
          type: string
          enum:
            - WALLET_ADDRESS_VERIFIED
        messageKey:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - timestamp
        - code
        - message
      properties:
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        message:
          type: string
    LeaderDashboardResponse:
      type: object
      required:
        - leaderProfile
        - kpis
        - organizationSummary
        - monthlyVolume
        - feeSummary
        - riskAlerts
      properties:
        leaderProfile:
          $ref: '#/components/schemas/LeaderProfile'
        kpis:
          $ref: '#/components/schemas/LeaderKpis'
        organizationSummary:
          $ref: '#/components/schemas/OrganizationSummary'
        monthlyVolume:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyVolume'
        feeSummary:
          $ref: '#/components/schemas/FeeSummary'
        riskAlerts:
          type: array
          items:
            $ref: '#/components/schemas/RiskAlert'
    LeaderProfile:
      type: object
      properties:
        leaderId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        loginId:
          type: string
        status:
          type: string
          enum:
