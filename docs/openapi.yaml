  /api/partner/merchant-applications:
    get:
      summary: Merchant application summary for a sales partner
      description: Returns only partner-owned data. Pending application ownership requires an explicit partner/application foreign key before real application rows can be exposed.
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PartnerPageData'
        '403':
          $ref: '#/components/responses/ForbiddenCountryScope'
  /api/partner/merchant-applications/detail:
    get:
      summary: Merchant application detail page shell for a sales partner
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/CountryScopesHeader'
        - $ref: '#/components/parameters/CountryScopeQuery'
